appId: build.punchpress.desktop
productName: PunchPress

directories:
  output: artifacts
  buildResources: build_resources

files:
  - from: out
    to: out
    filter:
      - '**/*'
  - from: ../web/dist
    to: dist
    filter:
      - '**/*'
  - package.json
  - '!**/*.map'

fileAssociations:
  - ext: punch
    icon: punch.icns
    mimeType: application/vnd.punchpress+json
    name: PunchPress Document
    role: Editor

mac:
  category: public.app-category.graphics-design
  icon: build_resources/logo.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build_resources/entitlements.mac.plist
  entitlementsInherit: build_resources/entitlements.mac.plist
  target:
    - dmg
    - zip

dmg:
  sign: false
  format: ULFO
  icon: build_resources/logo.icns

publish:
  - provider: s3
    bucket: punchpress-electron-app-209596837609-us-east-1-an
    region: us-east-1
    acl: null
    path: /mac

afterSign: scripts/notarize.mjs
