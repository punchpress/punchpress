name: Release Integrity

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    release-integrity:
        name: Release Metadata + Desktop Artifacts
        runs-on: macos-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.5'

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Validate release metadata
              run: bun run release:check

            - name: Build unsigned desktop artifacts
              run: bun run build:desktop:unsigned

            - name: Verify desktop artifacts
              run: bun run release:check-desktop-artifacts
